name: micronegocios_app
description: Proyecto educativo con directorio de micronegocios.
publish_to: "none"
version: 1.0.2+3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.2.0
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3
  equatable: ^2.0.5
  geolocator: ^12.0.0
  google_maps_flutter: ^2.10.0
  url_launcher: ^6.3.0
  fl_chart: ^0.69.0
  http: ^1.2.2
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/fondo.jpg
    - assets/images/logo.png
    - assets/images/setting_14197001.png
    - assets/images/speech-bubble_14197144.png
    - assets/images/customer-service.png
    - assets/images/info.png
    - assets/images/institutional/
